<!DOCTYPE html>
<html>
<head>
<title>T-Rex Runner</title>
<style>
body{margin:0;background:#f7f7f7;font-family:sans-serif;text-align:center}
canvas{display:block;margin:auto;background:#fff}
#highscore{margin-top:8px;font-size:14px;color:#555}
#status{margin-top:6px;font-size:14px;font-weight:bold;color:#333;min-height:20px}
#controls{margin-top:10px}
#startBtn{
  padding:8px 28px;font-size:15px;font-weight:bold;
  background:#2f9e44;color:#fff;border:none;border-radius:6px;
  cursor:pointer;letter-spacing:0.5px;
}
#startBtn:hover{background:#237a33}
#startBtn:disabled{background:#aaa;cursor:default}
</style>
</head>
<body>
<canvas id="game" aria-label="game-canvas" width="800" height="200"></canvas>
<p id="highscore" aria-label="high-score">High Score: 0</p>
<p id="status" aria-label="game-status">Press Start to play</p>
<div id="controls">
  <button id="startBtn" aria-label="start-button">Start</button>
</div>
<script src="game.js"></script>
</body>
</html>
